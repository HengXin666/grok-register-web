# grok-register-web + Turnstile Solver
#
# 一键：
#   docker compose -f docker-compose.yml up -d
#   打开 http://127.0.0.1:5000
#
# 设置页必配：
#   注册后端 = protocol
#   Turnstile = external / solver
#   Solver URL = http://turnstile-solver:5072
#   （容器之间用服务名，不要用 127.0.0.1）
#
# 镜像：
#   控制台  ghcr.io/hengxin666/grok-register-web:latest
#   打码器  ghcr.io/hengxin666/grok-register-web-solver:latest
# 若 solver 镜像尚未发布，用 docker-compose.build.yml 本地构建。

services:
  grok-register-web:
    image: ${GROK_REGISTER_IMAGE:-ghcr.io/hengxin666/grok-register-web:latest}
    container_name: grok-register-web
    restart: unless-stopped
    pull_policy: always
    depends_on:
      turnstile-solver:
        condition: service_started
    ports:
      - "${GROK_REGISTER_PORT:-5000}:5000"
    environment:
      GROK_REGISTER_SECRET_KEY: ${GROK_REGISTER_SECRET_KEY:-}
      GROK_REGISTER_BROWSER_HEADLESS: ${GROK_REGISTER_BROWSER_HEADLESS:-false}
      GROK_REGISTER_BROWSER_PATH: ${GROK_REGISTER_BROWSER_PATH:-/usr/bin/chromium}
      # 默认指向 compose 网络里的 solver 服务名
      GROK_REGISTER_SOLVER_URL: ${GROK_REGISTER_SOLVER_URL:-http://turnstile-solver:5072}
    volumes:
      - grok-register-data:/app/data
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Cloudflare Turnstile 打码（验证码求解）
  turnstile-solver:
    image: ${GROK_SOLVER_IMAGE:-ghcr.io/hengxin666/grok-register-web-solver:latest}
    container_name: turnstile-solver
    restart: unless-stopped
    pull_policy: always
    ports:
      # 可选：宿主机调试用；主站容器用服务名访问，不依赖此端口
      - "${SOLVER_PORT:-5072}:5072"
    environment:
      SOLVER_HOST: "0.0.0.0"
      SOLVER_PORT: "5072"
      # 单线程更稳：多线程在小机器上反而互相抢 CPU 导致 CAPTCHA_FAIL
      SOLVER_THREADS: ${SOLVER_THREADS:-1}
      SOLVER_BROWSER_TYPE: ${SOLVER_BROWSER_TYPE:-chromium}
      SOLVER_DEBUG: ${SOLVER_DEBUG:-1}
      # 默认不拦截静态资源（拦截易导致 Turnstile 失败）
      SOLVER_BLOCK_RESOURCES: ${SOLVER_BLOCK_RESOURCES:-0}
      SOLVER_MAX_ATTEMPTS: ${SOLVER_MAX_ATTEMPTS:-80}
      SOLVER_MAX_CLICKS: ${SOLVER_MAX_CLICKS:-20}
    # 性能：共享内存 + 资源预留（有则生效；旧 compose 忽略 cpus 也可）
    shm_size: "2gb"
    mem_limit: ${SOLVER_MEM_LIMIT:-2g}
    cpus: ${SOLVER_CPUS:-2.0}
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5072/"]
      interval: 30s
      timeout: 8s
      retries: 8
      start_period: 90s

volumes:
  grok-register-data:
