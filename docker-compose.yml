# grok-register-web — 仅需本文件即可运行（无需源码 / 无需 build）
#
# 用法：
#   docker compose -f docker-compose.yml up -d
#   打开 http://127.0.0.1:5000
#
# 可选环境变量：
#   GROK_REGISTER_PORT=5000
#   GROK_REGISTER_SECRET_KEY=任意随机串
#   GROK_REGISTER_IMAGE=ghcr.io/hengxin666/grok-register-web:latest
#
# 说明：
# - 镜像由 GitHub Actions 推到 GHCR，compose 只 pull，不本地构建。
# - 推荐：协议注册 + 外置 Turnstile Solver（在网页设置里配置 solver URL）。
# - 容器内不要指望 headful Chrome（无 DISPLAY）。

services:
  grok-register-web:
    image: ${GROK_REGISTER_IMAGE:-ghcr.io/hengxin666/grok-register-web:latest}
    container_name: grok-register-web
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${GROK_REGISTER_PORT:-5000}:5000"
    environment:
      GROK_REGISTER_SECRET_KEY: ${GROK_REGISTER_SECRET_KEY:-}
    volumes:
      - grok-register-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    extra_hosts:
      # 便于容器访问宿主机上的 Solver / 代理（Linux Docker）
      - "host.docker.internal:host-gateway"

volumes:
  grok-register-data:
