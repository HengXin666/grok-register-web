# grok-register-web
#
# Usage:
#   docker compose up -d --build
#   open http://127.0.0.1:5000
#
# GHCR (after CI publishes):
#   image: ghcr.io/<owner>/grok-register-web:latest
#
# Protocol + external Turnstile Solver is the recommended container mode.
# Do not enable browser Turnstile fallback unless you add Xvfb + Chrome.

services:
  grok-register-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GROK_REGISTER_IMAGE:-ghcr.io/hengxin666/grok-register-web:latest}
    container_name: grok-register-web
    restart: unless-stopped
    ports:
      - "${GROK_REGISTER_PORT:-5000}:5000"
    environment:
      # Optional secret for Flask sessions
      GROK_REGISTER_SECRET_KEY: ${GROK_REGISTER_SECRET_KEY:-}
      # Point at a host/network Solver if not co-located
      # TURNSTILE_SOLVER_URL is not read by app by default — configure in UI / DB.
    volumes:
      # Persist SQLite + exports
      - grok-register-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    # If Solver runs on the same Docker network, add e.g.:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Optional local Turnstile Solver (Camoufox-based). Enable when you have the
  # solver dependencies and enough RAM/CPU. Default: profile off — start only
  # the web console.
  #
  # turnstile-solver:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.solver
  #   restart: unless-stopped
  #   ports:
  #     - "5072:5072"
  #   shm_size: "1gb"

volumes:
  grok-register-data:
